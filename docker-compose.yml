services:
  tiktok-live-monitor:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
    volumes:
      # Persiste ~800MB do GGUF + binários entre reinícios
      - llm-models:/app/models
      - llm-bin:/app/bin

volumes:
  llm-models:
  llm-bin:
